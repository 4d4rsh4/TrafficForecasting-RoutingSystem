<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatio-Temporal Traffic Simulation</title>
    <!-- Modern Font and Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet Map Library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    
    <style>
        /* --- MODERN AI DASHBOARD CSS --- */
        :root {
            --bg-dark: #09090b;
            --bg-card: rgba(39, 39, 42, 0.4);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #a1a1aa;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-glow: rgba(59, 130, 246, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.05), transparent 25%);
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 40px;
            padding: 0 10px;
            color: white;
            text-decoration: none;
        }

        .brand i { color: var(--accent); font-size: 24px; }

        .nav-links { display: flex; flex-direction: column; gap: 8px; flex: 1; }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-link:hover { background: rgba(255, 255, 255, 0.05); color: var(--text-main); }
        .nav-link.active { background: rgba(59, 130, 246, 0.15); color: var(--accent); border: 1px solid rgba(59, 130, 246, 0.3); }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 32px;
            overflow-y: auto;
        }

        .header { margin-bottom: 24px; }
        .header h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 6px; }
        .header p { color: var(--text-muted); font-size: 15px; }

        /* --- GLASS CARDS --- */
        .dashboard-grid {
            display: flex;
            flex-direction: column;
            gap: 24px;
            height: 100%;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.2);
        }

        /* --- CONTROLS SECTION --- */
        .controls-row {
            display: flex;
            align-items: flex-end;
            gap: 20px;
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            min-width: 200px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .custom-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            color: white;
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
            appearance: none;
        }

        .custom-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        select.custom-input { background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a1a1aa' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em; }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 15px var(--accent-glow);
            height: 50px; /* Match input height */
        }

        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 0 20px var(--accent-glow); }
        .btn-primary:active { transform: translateY(1px); }

        /* --- MAP CONTAINER --- */
        .map-card {
            flex: 1;
            padding: 0;
            overflow: hidden;
            position: relative;
            min-height: 500px;
        }

        #map-frame { width: 100%; height: 100%; border: none; border-radius: 16px; }

        /* --- LOADER OVERLAY --- */
        #loader-overlay {
            position: absolute;
            inset: 0;
            background: rgba(9, 9, 11, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: 16px;
        }

        .modern-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        .loader-text { color: white; font-size: 16px; font-weight: 500; letter-spacing: 0.5px; animation: pulse 2s infinite; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* --- MAP SELECTOR --- */
        .map-selector-section {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .map-selector-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .map-selector-header h3 {
            color: white;
            font-size: 16px;
        }

        .map-toggle-btn {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.5);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .map-toggle-btn:hover {
            background: rgba(59, 130, 246, 0.3);
            border-color: var(--accent);
        }

        .map-toggle-btn.active {
            background: var(--accent);
            color: white;
        }

        #selector-map {
            width: 100%;
            height: 300px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            margin-bottom: 12px;
            display: none;
        }

        #selector-map.active {
            display: block;
        }

        .map-instructions {
            font-size: 12px;
            color: var(--text-muted);
            display: none;
        }

        .map-instructions.active {
            display: block;
        }

        .map-instructions i {
            margin-right: 6px;
            color: var(--accent);
        }
    </style>
</head>
<body>

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <a href="#" class="brand">
            <i class="fa-solid fa-route"></i>
            TrafficControl
        </a>
        <nav class="nav-links">
            <a href="index.html" class="nav-link">
                <i class="fa-solid fa-house"></i> Home
            </a>
            <a href="#" class="nav-link active">
                <i class="fa-solid fa-chart-network"></i> Simulation Model
            </a>
            <a href="index.html#about" class="nav-link">
                <i class="fa-solid fa-circle-info"></i> About System
            </a>
        </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
        <div class="header">
            <h1>Traffic Simulation</h1>
            <p>GCN-GRU Spatio-Temporal Predictive Routing Engine</p>
        </div>

        <div class="dashboard-grid">
            <!-- Controls Card -->
            <div class="card">
                <!-- Map Selector Section -->
                <div class="map-selector-section">
                    <div class="map-selector-header">
                        <h3><i class="fa-solid fa-map-pin"></i> Select Points on Map</h3>
                        <button class="map-toggle-btn" id="mapToggleBtn">
                            <i class="fa-solid fa-map"></i> Open Map
                        </button>
                    </div>
                    <div id="selector-map"></div>
                    <div class="map-instructions" id="mapInstructions">
                        <i class="fa-solid fa-info-circle"></i> Click on the map to select <strong>Start Point</strong> (green), then <strong>End Point</strong> (red)
                    </div>
                </div>

                <div style="margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">
                    <h3 style="color: white; font-size: 16px; margin-bottom: 15px;">Starting Point</h3>
                    <div class="controls-row">
                        <div class="input-group" style="flex: 0.5;">
                            <label for="start_lat">Latitude</label>
                            <input type="number" id="start_lat" class="custom-input" step="0.0001" value="44.9525" placeholder="-90 to 90">
                        </div>
                        <div class="input-group" style="flex: 0.5;">
                            <label for="start_lon">Longitude</label>
                            <input type="number" id="start_lon" class="custom-input" step="0.0001" value="-93.1554" placeholder="-180 to 180">
                        </div>
                    </div>
                </div>

                <div style="margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">
                    <h3 style="color: white; font-size: 16px; margin-bottom: 15px;">Destination</h3>
                    <div class="controls-row">
                        <div class="input-group" style="flex: 0.5;">
                            <label for="end_lat">Latitude</label>
                            <input type="number" id="end_lat" class="custom-input" step="0.0001" value="44.9733" placeholder="-90 to 90">
                        </div>
                        <div class="input-group" style="flex: 0.5;">
                            <label for="end_lon">Longitude</label>
                            <input type="number" id="end_lon" class="custom-input" step="0.0001" value="-93.2810" placeholder="-180 to 180">
                        </div>
                    </div>
                </div>

                <div style="margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">
                    <h3 style="color: white; font-size: 16px; margin-bottom: 15px;">Prediction Parameters</h3>
                    <div class="controls-row">
                        <div class="input-group" style="flex: 0.5;">
                            <label for="sim_day">Day of Week</label>
                            <select id="sim_day" class="custom-input">
                                <option value="Monday">Monday</option>
                                <option value="Tuesday">Tuesday</option>
                                <option value="Wednesday">Wednesday</option>
                                <option value="Thursday">Thursday</option>
                                <option value="Friday" selected>Friday</option>
                                <option value="Saturday">Saturday</option>
                                <option value="Sunday">Sunday</option>
                            </select>
                        </div>
                        
                        <div class="input-group" style="flex: 0.5;">
                            <label for="sim_hour">Time of Day (0-23)</label>
                            <input type="number" id="sim_hour" class="custom-input" min="0" max="23" value="17" placeholder="e.g., 17 for 5 PM">
                        </div>
                    </div>
                </div>
                
                <div class="controls-row">
                    <button id="findRouteBtn" class="btn-primary" style="flex: 1;">
                        <i class="fa-solid fa-microchip"></i> Run AI Simulation
                    </button>
                    <button id="resetBtn" class="btn-primary" style="flex: 1; background: rgba(255,255,255,0.1); color: var(--text-muted);">
                        <i class="fa-solid fa-arrows-rotate"></i> Reset
                    </button>
                </div>
            </div>

            <!-- Map Output Card -->
            <div class="card map-card" style="display: flex; flex-direction: column;">
                <div id="loader-overlay">
                    <div class="modern-spinner"></div>
                    <div class="loader-text">Querying GCN-GRU Model...</div>
                </div>
                <!-- scrolling="no" prevents the weird double scrollbar -->
                <iframe id="map-frame" src="about:blank" scrolling="no" style="flex: 1;"></iframe>
            </div>
        </div>
    </main>

    <!-- JavaScript to handle the backend connection -->
    <script>
        // ===== MAP SELECTOR INITIALIZATION =====
        let selectorMap = null;
        let isMapActive = false;
        let selectionMode = null;  // 'start' or 'end'
        let startMarker = null;
        let endMarker = null;

        const mapToggleBtn = document.getElementById('mapToggleBtn');
        const selectorMapDiv = document.getElementById('selector-map');
        const mapInstructions = document.getElementById('mapInstructions');

        // Toggle map visibility
        mapToggleBtn.addEventListener('click', () => {
            isMapActive = !isMapActive;
            
            if (isMapActive) {
                selectorMapDiv.classList.add('active');
                mapInstructions.classList.add('active');
                mapToggleBtn.classList.add('active');
                mapToggleBtn.innerHTML = '<i class="fa-solid fa-xmark"></i> Close Map';
                
                // Initialize map if not already done
                if (!selectorMap) {
                    initializeMap();
                } else {
                    selectorMap.invalidateSize();
                }
            } else {
                selectorMapDiv.classList.remove('active');
                mapInstructions.classList.remove('active');
                mapToggleBtn.classList.remove('active');
                mapToggleBtn.innerHTML = '<i class="fa-solid fa-map"></i> Open Map';
            }
        });

        // Initialize Leaflet map
        function initializeMap() {
            const minneapolisCenter = [44.9625, -93.2165];
            // Minneapolis-St. Paul boundaries (I-94 corridor)
            const bounds = L.latLngBounds(
                [44.930, -93.300],  // Southwest
                [44.995, -93.080]   // Northeast
            );
            
            selectorMap = L.map('selector-map', {
                maxBounds: bounds,
                maxBoundsViscosity: 1.0  // Prevent panning outside bounds
            }).setView(minneapolisCenter, 11);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19,
            }).addTo(selectorMap);

            // Show start/end coordinates already entered
            const startLat = parseFloat(document.getElementById('start_lat').value);
            const startLon = parseFloat(document.getElementById('start_lon').value);
            const endLat = parseFloat(document.getElementById('end_lat').value);
            const endLon = parseFloat(document.getElementById('end_lon').value);

            if (!isNaN(startLat) && !isNaN(startLon)) {
                startMarker = L.circleMarker([startLat, startLon], {
                    radius: 8,
                    fillColor: '#10b981',
                    color: '#059669',
                    weight: 2,
                    fillOpacity: 0.8
                }).addTo(selectorMap).bindPopup('Start Point');
            }

            if (!isNaN(endLat) && !isNaN(endLon)) {
                endMarker = L.circleMarker([endLat, endLon], {
                    radius: 8,
                    fillColor: '#ef4444',
                    color: '#dc2626',
                    weight: 2,
                    fillOpacity: 0.8
                }).addTo(selectorMap).bindPopup('End Point');
            }

            // Map click handler
            selectorMap.on('click', (e) => {
                const { lat, lng } = e.latlng;
                
                // Toggle between start and end point selection
                if (selectionMode === null || selectionMode === 'end') {
                    // Set start point
                    selectionMode = 'start';
                    document.getElementById('start_lat').value = lat.toFixed(4);
                    document.getElementById('start_lon').value = lng.toFixed(4);
                    
                    if (startMarker) selectorMap.removeLayer(startMarker);
                    startMarker = L.circleMarker([lat, lng], {
                        radius: 8,
                        fillColor: '#10b981',
                        color: '#059669',
                        weight: 2,
                        fillOpacity: 0.8
                    }).addTo(selectorMap).bindPopup('Start Point').openPopup();
                    
                    mapInstructions.innerHTML = '<i class="fa-solid fa-circle-check"></i> <strong>Start Point Set!</strong> Now click to select <strong>End Point</strong> (red)';
                } else if (selectionMode === 'start') {
                    // Set end point
                    selectionMode = 'end';
                    document.getElementById('end_lat').value = lat.toFixed(4);
                    document.getElementById('end_lon').value = lng.toFixed(4);
                    
                    if (endMarker) selectorMap.removeLayer(endMarker);
                    endMarker = L.circleMarker([lat, lng], {
                        radius: 8,
                        fillColor: '#ef4444',
                        color: '#dc2626',
                        weight: 2,
                        fillOpacity: 0.8
                    }).addTo(selectorMap).bindPopup('End Point').openPopup();
                    
                    mapInstructions.innerHTML = '<i class="fa-solid fa-check-double"></i> <strong>Both Points Set!</strong> Close the map and click "Run AI Simulation"';
                }
            });

            // Fit bounds to show both markers if available
            if (startMarker && endMarker) {
                const group = new L.featureGroup([startMarker, endMarker]);
                selectorMap.fitBounds(group.getBounds(), { padding: [50, 50] });
            }
        }

        // ===== EXISTING FORM LOGIC =====
        // Store default values for reset button
        const defaultValues = {
            start_lat: 44.9525,
            start_lon: -93.1554,
            end_lat: 44.9733,
            end_lon: -93.2810,
            sim_day: 'Friday',
            sim_hour: '17'
        };

        // Set defaults on page load
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('start_lat').value = defaultValues.start_lat;
            document.getElementById('start_lon').value = defaultValues.start_lon;
            document.getElementById('end_lat').value = defaultValues.end_lat;
            document.getElementById('end_lon').value = defaultValues.end_lon;
            document.getElementById('sim_day').value = defaultValues.sim_day;
            document.getElementById('sim_hour').value = defaultValues.sim_hour;
        });

        // Reset button functionality
        document.getElementById('resetBtn').addEventListener('click', () => {
            document.getElementById('start_lat').value = defaultValues.start_lat;
            document.getElementById('start_lon').value = defaultValues.start_lon;
            document.getElementById('end_lat').value = defaultValues.end_lat;
            document.getElementById('end_lon').value = defaultValues.end_lon;
            document.getElementById('sim_day').value = defaultValues.sim_day;
            document.getElementById('sim_hour').value = defaultValues.sim_hour;
        });

        document.getElementById('findRouteBtn').addEventListener('click', () => {
            console.log('=== FIND ROUTE BUTTON CLICKED ===');
            const start_lat = parseFloat(document.getElementById('start_lat').value);
            const start_lon = parseFloat(document.getElementById('start_lon').value);
            const end_lat = parseFloat(document.getElementById('end_lat').value);
            const end_lon = parseFloat(document.getElementById('end_lon').value);
            const day = document.getElementById('sim_day').value;
            const hour = parseInt(document.getElementById('sim_hour').value);
            console.log('Form values:', {start_lat, start_lon, end_lat, end_lon, day, hour});
            const loader = document.getElementById('loader-overlay');

            // Validation
            if (isNaN(start_lat) || isNaN(start_lon) || isNaN(end_lat) || isNaN(end_lon)) {
                alert("Please enter valid coordinates.");
                return;
            }
            // Minneapolis-St. Paul bounds
            const BOUNDS = { north: 44.995, south: 44.930, east: -93.080, west: -93.300 };
            if (start_lat < BOUNDS.south || start_lat > BOUNDS.north) {
                alert(`Start latitude must be between ${BOUNDS.south} and ${BOUNDS.north}.`);
                return;
            }
            if (end_lat < BOUNDS.south || end_lat > BOUNDS.north) {
                alert(`End latitude must be between ${BOUNDS.south} and ${BOUNDS.north}.`);
                return;
            }
            if (start_lon < BOUNDS.west || start_lon > BOUNDS.east) {
                alert(`Start longitude must be between ${BOUNDS.west} and ${BOUNDS.east}.`);
                return;
            }
            if (end_lon < BOUNDS.west || end_lon > BOUNDS.east) {
                alert(`End longitude must be between ${BOUNDS.west} and ${BOUNDS.east}.`);
                return;
            }
            if (hour < 0 || hour > 23) {
                alert("Hour must be between 0 and 23.");
                return;
            }

            const payload = {
                day: day,
                hour: hour,
                start_lat: start_lat,
                start_lon: start_lon,
                end_lat: end_lat,
                end_lon: end_lon
            };
            
            console.log('Sending payload to backend:', payload);
            // Show Loader
            loader.style.display = 'flex';

            // Make API Call to Flask Backend
            console.log('Calling: http://127.0.0.1:5000/get_route');
            fetch('http://127.0.0.1:5000/get_route', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(response => {
                console.log('Response received with status:', response.status);
                return response.json();
            })
            .then(data => {
                console.log('JSON parsed:', data);
                loader.style.display = 'none';
                if (data.error) {
                    console.error('Backend error:', data.error);
                    alert('Error: ' + data.error);
                } else if (data.map_html) {
                    console.log('Displaying map...');
                    const mapFrame = document.getElementById('map-frame');
                    mapFrame.srcdoc = data.map_html; 
                }
            })
            .catch(error => {
                console.error('Fetch failed:', error);
                loader.style.display = 'none';
                alert('Failed to connect to the backend server. Make sure app.py is running.');
            });
        });
    </script>
</body>
</html>
