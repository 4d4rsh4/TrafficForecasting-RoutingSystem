<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routing Simulation</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #0f172a; display: flex; flex-direction: column; align-items: center; padding-top: 20px; font-family: 'Inter', sans-serif;}
        .container { background: rgba(30, 41, 59, 0.9); border-radius: 20px; padding: 30px; width: 90%; max-width: 1200px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid rgba(59, 130, 246, 0.2); }
        h1 { color: #60a5fa; text-align: center; margin-bottom: 5px; }
        p.subtitle { color: #94a3b8; text-align: center; margin-bottom: 25px; }
        .controls { display: flex; gap: 15px; margin-bottom: 20px; justify-content: center; align-items: center;}
        .controls select, .controls input { padding: 12px; border-radius: 10px; border: 2px solid rgba(59, 130, 246, 0.4); background: #1e293b; color: white; font-size: 16px; outline: none; }
        .controls select:focus, .controls input:focus { border-color: #3b82f6; }
        .controls button { padding: 12px 25px; background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: transform 0.2s; }
        .controls button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4); }
        #map-container { width: 100%; height: 600px; border: 2px solid rgba(59, 130, 246, 0.2); border-radius: 15px; overflow: hidden; background: #0f172a; position: relative;}
        #map-container iframe { width: 100%; height: 100%; border: none; }
        #loader-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; color: #60a5fa; font-size: 20px; font-weight: bold; }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #3b82f6; animation: spin 1s linear infinite; margin-bottom: 15px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>Traffic Simulation</h1>
        <p class="subtitle">GCN-GRU Spatio-Temporal Predictive Routing</p>
        
        <div class="controls">
            <select id="sim_day">
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday">Thursday</option>
                <option value="Friday" selected>Friday</option>
                <option value="Saturday">Saturday</option>
                <option value="Sunday">Sunday</option>
            </select>
            
            <input type="number" id="sim_hour" min="0" max="23" value="17" placeholder="Hour (0-23)">
            <span>: 00</span>
            
            <button id="findRouteBtn">Simulate Traffic & Route</button>
        </div>
        
        <div id="map-container">
            <div id="loader-overlay">
                <div class="spinner"></div>
                <span>Querying Model & Generating Map...</span>
            </div>
            <iframe id="map-frame" src="about:blank"></iframe>
        </div>
    </div>

    <script>
        document.getElementById('findRouteBtn').addEventListener('click', () => {
            const day = document.getElementById('sim_day').value;
            const hour = document.getElementById('sim_hour').value;
            const loader = document.getElementById('loader-overlay');

            if (hour < 0 || hour > 23 || hour === "") {
                alert("Please enter a valid hour between 0 and 23.");
                return;
            }

            // Fixed coordinates for a major stretch of I-94 (St. Paul to Minneapolis)
            const payload = {
                day: day,
                hour: parseInt(hour),
                start_lat: 44.9525, 
                start_lon: -93.1554,
                end_lat: 44.9733,  
                end_lon: -93.2810  
            };
            
            loader.style.display = 'flex';

            fetch('http://127.0.0.1:5000/get_route', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                loader.style.display = 'none';
                if (data.error) {
                    alert('Error: ' + data.error);
                } else if (data.map_html) {
                    const mapFrame = document.getElementById('map-frame');
                    mapFrame.srcdoc = data.map_html; 
                }
            })
            .catch(error => {
                loader.style.display = 'none';
                console.error('Error:', error);
                alert('Failed to connect to the backend server.');
            });
        });
    </script>
</body>
</html>
